{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">비밀번호 변경</h2>
    
    <form action="{{ url_for('auth.change_password') }}" method="post" class="auth-form">
        <div style="text-align: left; margin-bottom: 1rem;">
            <label for="current_password" style="color: var(--text-secondary); font-size: 0.9rem; display: block; margin-bottom: 5px;">현재 비밀번호</label>
            <input type="password" name="current_password" id="current_password" required style="width: 100%;">
        </div>

        <div style="text-align: left; margin-bottom: 1rem;">
            <label for="new_password" style="color: var(--text-secondary); font-size: 0.9rem; display: block; margin-bottom: 5px;">새 비밀번호</label>
            <input type="password" name="new_password" id="new_password" required style="width: 100%;">
        </div>

        <div style="text-align: left; margin-bottom: 1.5rem;">
            <label for="confirm_password" style="color: var(--text-secondary); font-size: 0.9rem; display: block; margin-bottom: 5px;">새 비밀번호 확인</label>
            <input type="password" name="confirm_password" id="confirm_password" required style="width: 100%;">
        </div>
        
        <button type="submit" class="submit-button">비밀번호 변경</button>
    </form>
    
    <div style="margin-top: 1.5rem;">
        <a href="{{ url_for('main.mypage', nickname=current_user.nickname) }}" style="color: var(--text-secondary); text-decoration: none; border-bottom: 1px solid var(--text-secondary);">취소하고 돌아가기</a>
    </div>
</div>
{% endblock %}
