{% extends 'base.html' %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
    .battle-result-container {
        max-width: 1000px;
        margin: 40px auto;
        text-align: center;
        padding: 40px 20px;
        background: linear-gradient(135deg, var(--bg-color) 0%, var(--hover-bg) 100%);
        border-radius: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .match-status {
        font-size: 5rem;
        font-weight: 900;
        margin-bottom: 50px;
        letter-spacing: 6px;
        text-transform: uppercase;
        animation: scaleUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    
    .status-win { color: #1976d2; text-shadow: 0 0 20px rgba(25, 118, 210, 0.4); }
    .status-lose { color: #d32f2f; text-shadow: 0 0 20px rgba(211, 47, 47, 0.4); }
    .status-draw { color: var(--text-secondary); text-shadow: 0 0 20px rgba(117, 117, 117, 0.3); }

    .vs-board {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 40px;
        position: relative;
    }

    .vs-badge {
        font-size: 3rem;
        font-weight: 900;
        color: var(--text-primary);
        font-style: italic;
        background: var(--bg-color);
        padding: 25px;
        border-radius: 50%;
        box-shadow: inset 0 4px 10px rgba(0,0,0,0.05), 0 10px 20px rgba(0,0,0,0.1);
        z-index: 10;
        border: 4px solid var(--border-color);
    }

    .player-card {
        flex: 1;
        background-color: var(--card-bg);
        border-radius: 30px;
        padding: 50px 20px;
        border: 3px solid transparent;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card-winner { 
        border-color: #FFD700; 
        box-shadow: 0 20px 40px rgba(255, 215, 0, 0.25); 
        transform: translateY(-15px) scale(1.02); 
    }
    .card-loser { 
        opacity: 0.85; 
        filter: grayscale(40%); 
        transform: translateY(10px);
    }

    .avatar-wrap { position: relative; margin-bottom: 30px; }
    
    .main-avatar {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        object-fit: cover;
        border: 6px solid var(--card-bg);
        box-shadow: 0 15px 25px rgba(0,0,0,0.15);
    }
    
    .sub-avatar {
        position: absolute;
        bottom: -5px;
        right: -15px;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid var(--card-bg);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .user-name { font-size: 1.6rem; color: var(--text-primary); font-weight: 800; margin-bottom: 8px; }
    .matched-name { font-size: 1.15rem; color: var(--text-secondary); margin-bottom: 25px; }
    
    .score-box {
        background-color: var(--bg-color);
        padding: 18px 45px;
        border-radius: 50px;
        font-size: 2.5rem;
        font-weight: 900;
        color: var(--text-primary);
        border: 2px solid var(--border-color);
    }

    .btn-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 70px;
    }
    
    .btn-action {
        padding: 18px 40px;
        border-radius: 50px;
        font-size: 1.2rem;
        font-weight: 700;
        text-decoration: none;
        transition: all 0.3s ease;
    }
    
    .btn-retry { background-color: var(--button-bg); color: var(--button-text); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .btn-retry:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }
    
    .btn-home { background-color: transparent; color: var(--text-primary); border: 2px solid var(--border-color); }
    .btn-home:hover { background-color: var(--hover-bg); border-color: var(--text-secondary); }

    @keyframes scaleUp {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 768px) {
        .vs-board { flex-direction: column; gap: 30px; }
        .vs-badge { margin: 15px 0; padding: 15px; font-size: 2rem; }
        .player-card { width: 100%; padding: 40px 20px; }
        .match-status { font-size: 3.5rem; margin-bottom: 40px; }
    }
</style>

<div class="battle-result-container">
    <div class="match-status status-{{ match_result|lower }}">{{ match_result }}!</div>

    <div class="vs-board">
        <div class="player-card {% if match_result == 'LOSE' %}card-winner{% else %}card-loser{% endif %}">
            <h3 style="color: var(--text-secondary); margin-top: 0; margin-bottom: 25px; font-size: 1.1rem;">방어자 기록</h3>
            <div class="avatar-wrap">
                <img src="{{ url_for('static', filename='images/' ~ target_player_img) }}" class="main-avatar" onerror="this.src='{{ url_for('static', filename='images/default_logo.png') }}'">
                <img src="{{ url_for('static', filename='uploads/profiles/' ~ target.user.profile_image) }}" class="sub-avatar" onerror="this.src='{{ url_for('static', filename='images/default_logo.png') }}'">
            </div>
            <div class="user-name">{{ target.user.nickname }}</div>
            <div class="matched-name">{{ target_player_name }}</div>
            <div class="score-box">{{ target.similarity }}%</div>
        </div>

        <div class="vs-badge">VS</div>

        <div class="player-card {% if match_result == 'WIN' %}card-winner{% else %}card-loser{% endif %}">
            <h3 style="color: var(--text-secondary); margin-top: 0; margin-bottom: 25px; font-size: 1.1rem;">나의 도전 기록</h3>
            <div class="avatar-wrap">
                <img src="{{ url_for('static', filename='images/' ~ my_player_img) }}" class="main-avatar" onerror="this.src='{{ url_for('static', filename='images/default_logo.png') }}'">
                <img src="{{ url_for('static', filename='uploads/profiles/' ~ current_user.profile_image) }}" class="sub-avatar" onerror="this.src='{{ url_for('static', filename='images/default_logo.png') }}'">
            </div>
            <div class="user-name">{{ current_user.nickname }}</div>
            <div class="matched-name">{{ my_player_name }}</div>
            <div class="score-box" style="color: {% if match_result == 'WIN' %}#1976d2{% else %}var(--text-primary){% endif %};">{{ my_score }}%</div>
        </div>
    </div>

    <div class="btn-group">
        <a href="/battle" class="btn-action btn-retry">다른 유저에게 도전하기</a>
        <a href="/" class="btn-action btn-home">메인으로 가기</a>
    </div>
</div>

<script>
    {% if match_result == 'WIN' %}
    document.addEventListener('DOMContentLoaded', function() {
        var duration = 3 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount,
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
            }));
            confetti(Object.assign({}, defaults, { particleCount,
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
            }));
        }, 250);
    });
    {% endif %}
</script>
{% endblock %}
