{% extends 'base.html' %}

{% block content %}
<main class="main-container">
    <div style="width: 100%; max-width: 500px; margin: 0 auto; padding-top: 2rem;">
        <h2 style="font-size: 1.6rem; margin-bottom: 2rem; color: var(--text-primary);">설정</h2>

        <section class="settings-section">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                <span style="font-size: 1.1rem; color: var(--text-primary);">다크 모드</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </section>
    </div>
</main>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    
    if (document.documentElement.getAttribute('data-theme') === 'dark') {
        themeToggle.checked = true;
    }

    themeToggle.addEventListener('change', function(e) {
        if (e.target.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        }
    });
</script>
{% endblock %}
