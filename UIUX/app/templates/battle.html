{% extends 'base.html' %}

{% block content %}
<style>
    .battle-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    
    .battle-header { text-align: center; margin-bottom: 40px; }
    .battle-title { font-size: 2.2rem; color: var(--text-primary); margin-bottom: 15px; }
    .battle-subtitle { color: var(--text-secondary); font-size: 1.05rem; }
    
    .search-box {
        width: 100%;
        padding: 18px 25px;
        font-size: 1.1rem;
        border: 2px solid var(--border-color);
        border-radius: 30px;
        background-color: var(--card-bg);
        color: var(--text-primary);
        margin-bottom: 40px;
        outline: none;
        transition: border-color 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .search-box:focus { border-color: var(--text-primary); }
    
    .feed-list { display: flex; flex-direction: column; gap: 15px; }
    
    .feed-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        border-radius: 16px;
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .feed-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        border-color: var(--text-secondary);
    }
    
    .feed-left { display: flex; align-items: center; gap: 25px; }
    .feed-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .feed-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }
    .feed-name { font-size: 1rem; color: var(--text-primary); font-weight: 500; }
    .feed-sub { font-size: 0.85rem; color: var(--text-secondary); }
    
    .feed-score { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); }
    .feed-badge {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 12px;
        margin-bottom: 5px;
        font-weight: 600;
    }
    .badge-pitch { background-color: rgba(25, 118, 210, 0.1); color: #1976d2; }
    .badge-hit { background-color: rgba(211, 47, 47, 0.1); color: #d32f2f; }

    /* 대결 종목 선택 모달 */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.5);
        display: none; justify-content: center; align-items: center; z-index: 2000;
    }
    .modal-content {
        background-color: var(--card-bg); padding: 40px; border-radius: 24px;
        text-align: center; max-width: 400px; width: 90%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .modal-title { color: var(--text-primary); font-size: 1.4rem; margin-bottom: 30px; }
    .btn-battle {
        display: block; width: 100%; padding: 18px; margin-bottom: 15px;
        border-radius: 16px; border: none; font-size: 1.1rem; font-weight: 600;
        cursor: pointer; transition: 0.2s; color: white;
    }
    .btn-pitch { background-color: #1976d2; }
    .btn-hit { background-color: #d32f2f; }
    .btn-battle:hover { opacity: 0.9; transform: scale(1.02); }
    .btn-close {
        background: transparent; border: none; color: var(--text-secondary);
        font-size: 1rem; cursor: pointer; margin-top: 10px; text-decoration: underline;
    }
</style>

<div class="battle-container">
    <div class="battle-header">
        <h1 class="battle-title">고스트 배틀</h1>
        <p class="battle-subtitle">다른 유저의 기록을 선택하고 나의 폼으로 도전장을 내미세요.</p>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="유저 닉네임을 검색하여 타겟을 찾아보세요...">

    <div class="feed-list" id="feedList">
        </div>
</div>

<div class="modal-overlay" id="battleModal">
    <div class="modal-content">
        <h2 class="modal-title">어떤 종목으로 도전하시겠습니까?</h2>
        <button class="btn-battle btn-pitch" onclick="startBattle('pitch')">나의 투구 폼으로 도전</button>
        <button class="btn-battle btn-hit" onclick="startBattle('hit')">나의 타격 폼으로 도전</button>
        <button class="btn-close" onclick="closeModal()">취소</button>
    </div>
</div>

<script>
    let currentTargetId = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadFeed();
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            loadFeed(e.target.value);
        });
    });

    async function loadFeed(query = '') {
        try {
            const response = await fetch(`/api/battle_feed?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            const container = document.getElementById('feedList');
            container.innerHTML = '';
            
            if (data.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">일치하는 기록이 없습니다.</div>';
                return;
            }

            data.forEach(item => {
                const badgeClass = item.type === 'pitch' ? 'badge-pitch' : 'badge-hit';
                const badgeText = item.type === 'pitch' ? '투구 기록' : '타격 기록';
                
                const div = document.createElement('div');
                div.className = 'feed-item';
                div.onclick = () => openModal(item.analysis_id);
                
                div.innerHTML = `
                    <div class="feed-left">
                        <div class="feed-col">
                            <img src="/static/uploads/profiles/${item.profile_image}" class="feed-avatar" onerror="this.src='/static/images/default_logo.png'">
                            <span class="feed-name">${item.nickname}</span>
                        </div>
                        <div class="feed-col">
                            <img src="${item.player_image}" class="feed-avatar" style="border-radius: 12px;" onerror="this.src='/static/images/default_logo.png'">
                            <span class="feed-sub">${item.player_name}</span>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end;">
                        <span class="feed-badge ${badgeClass}">${badgeText}</span>
                        <span class="feed-score">${item.score}%</span>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (error) {
            console.error('피드 로드 실패', error);
        }
    }

    function openModal(analysisId) {
        currentTargetId = analysisId;
        document.getElementById('battleModal').style.display = 'flex';
    }

    function closeModal() {
        currentTargetId = null;
        document.getElementById('battleModal').style.display = 'none';
    }

    function startBattle(myType) {
        if (!currentTargetId) return;
        
        // 종목에 맞는 업로드 페이지로 이동하되, URL에 타겟 기록 번호를 달아서 보냅니다.
        if (myType === 'pitch') {
            window.location.href = `/upload_pitch?target_id=${currentTargetId}`;
        } else {
            window.location.href = `/upload_hit?target_id=${currentTargetId}`;
        }
    }
</script>
{% endblock %}
