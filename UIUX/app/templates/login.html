{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title" style="margin-bottom: 30px;">로그인</h2>
    
    <form action="{{ url_for('auth.login') }}" method="post" class="auth-form">
        <input type="email" name="email" placeholder="이메일" required>
        <input type="password" name="password" placeholder="비밀번호" required>
        <button type="submit" class="submit-button" style="width: 100%; padding: 15px; border-radius: 12px; font-size: 1.05rem; margin-top: 10px;">로그인</button>
    </form>
    
    <div class="auth-footer" style="margin-top: 25px; font-size: 0.95rem;">
        <span style="color: var(--text-secondary);">아직 회원이 아니신가요?</span>
        <a href="{{ url_for('auth.signup') }}" style="color: var(--text-primary); font-weight: 500; text-decoration: none; margin-left: 5px; border-bottom: 1px solid var(--text-primary); padding-bottom: 2px;">회원가입</a>
    </div>
</div>
{% endblock %}
