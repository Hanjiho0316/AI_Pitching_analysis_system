<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchTypes</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background-color: #fff; }
        
        /* 네비게이션 바 */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #eee; }
        .nav-logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; }
        .nav-logo span { margin-right: 10px; }
        .nav-login { font-size: 0.9rem; color: #666; cursor: pointer; }

        /* 중앙 컨텐츠 */
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        
        .main-card { width: 500px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px; }
        .main-card img { width: 100%; border-radius: 15px; }

        /* 버튼 스타일 */
        .btn-start {
            display: flex; justify-content: space-between; align-items: center;
            width: 500px; padding: 15px 30px; border: 1.5px solid #333; border-radius: 40px;
            text-decoration: none; color: #333; font-weight: 600; font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-start:hover { background-color: #f8f8f8; transform: translateY(-2px); }
        .btn-start span.arrow { font-size: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">☰ PitchTypes</div>
        <div class="nav-login">가입/로그인</div>
    </nav>

    <div class="container">
        <div class="main-card">
            <img src="{{ url_for('static', filename='images/main_logo.png') }}" alt="Pitchers Logo">
        </div>

        <a href="/upload" class="btn-start">
            <span>나의 투구 폼 분석하러 가기</span>
            <span class="arrow">→</span>
        </a>
    </div>
</body>
</html>
