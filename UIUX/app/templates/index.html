<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PitchTypes</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Pretendard'; background: white; }
        header { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; border-bottom: 1px solid #eee; }
        .logo-text { font-size: 1.5rem; font-weight: 700; color: #333; }
        .main-content { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .logo-img { width: 300px; margin-bottom: 40px; }
        .go-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 350px; padding: 18px 40px; border: 2px solid #333;
            border-radius: 60px; text-decoration: none; color: #333;
            font-size: 1.2rem; font-weight: 700; transition: 0.3s;
        }
        .go-btn:hover { background: #333; color: white; transform: translateY(-5px); }
    </style>
</head>
<body>
    <header><div class="logo-text">☰ PitchTypes</div></header>
    <div class="main-content">
        <img src="{{ url_for('static', filename='main_logo.png') }}" class="logo-img">
        <a href="/upload_page" class="go-btn">나의 투구 폼 분석하러 가기 <span>→</span></a>
    </div>
</body>
</html>
