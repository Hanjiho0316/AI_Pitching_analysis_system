{% extends 'base.html' %}

{% block content %}
<main class="main-container">
    <section class="logo-section" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
        <h2 style="font-size: 1.4rem; color: var(--text-primary); margin-bottom: 1.5rem; font-weight: 400; word-break: keep-all;">나의 투구 폼은 어떤 선수와 가장 비슷할까?</h2>
        <img src="{{ url_for('static', filename='images/pitchtypes_logo.png') }}" alt="PitchTypes Logo" class="main-logo">
    </section>

    <section class="cta-section">
        <a href="{{ url_for('main.upload') }}" class="analysis-button">
            <span style="color: var(--text-primary);">나의 투구 폼 분석하러 가기</span>
            <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </section>
</main>
{% endblock %}
